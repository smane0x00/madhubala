<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fan Forum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Madhubala</a>

    <div class="ms-auto">
      <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
    </div>
  </div>
</nav>

<!-- Forum Section -->
<section class="container my-5">
  <h1 class="text-center mb-4">Fan Forum</h1>

  <!-- Post Form -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Create a Post</h5>
      <input type="text" id="username" class="form-control mb-2" placeholder="Your Name">
      <textarea id="message" class="form-control mb-2" placeholder="Write something..."></textarea>
      <button class="btn btn-dark" onclick="addPost()">Post</button>
    </div>
  </div>

  <!-- Posts -->
  <div id="posts"></div>

</section>

<footer class="bg-dark text-white text-center p-3">
  <p>© 2026 Madhubala Fan Page</p>
</footer>

<script src="script.js"></script>
</body>
</html>
